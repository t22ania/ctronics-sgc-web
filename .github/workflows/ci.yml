name: CI · Validación

# Integración Continua: valida el código en cada push y Pull Request a main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validar c-tronics.html (estructura HTML + sintaxis JS)
        run: node .github/scripts/validate-html.js
