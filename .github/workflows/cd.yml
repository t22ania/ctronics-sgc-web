name: CD · Despliegue a GitHub Pages

# Despliegue Continuo: se ejecuta cuando la CI ("CI · Validación") termina con éxito en main.
# Así nunca se publica código que no pasó la validación. También se puede lanzar a mano.
on:
  workflow_run:
    workflows: ["CI · Validación"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues simultáneos pisándose entre sí
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publicar:
    # Solo publica si la CI fue exitosa (o si se lanza manualmente)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar el sitio
        # index.html = página de inicio; se conserva también el nombre original
        run: |
          mkdir -p _site
          cp c-tronics.html _site/index.html
          cp c-tronics.html _site/c-tronics.html

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir el artefacto del sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
